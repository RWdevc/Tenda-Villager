<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprimentos</title>
    <link rel="icon" type="image/x-icon" href="img/tendavillager.png">

    <style>
        h1 {
            text-align: center;
        }
    </style>
    <style>
        p {
            margin-left: 50px;
            margin-right: 50px;
        }
    </style>
    <style>
        h2 {
            margin-left: 50px;
            margin-right: 50px;
            text-align: center;
            font-size: xx-large;
        }
    </style>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .fundo {
            position: fixed;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100% + 40px);

            background-image: url(img/fundomadeira.jpg);
            background-size: cover;
            background-position: center;
            background-repeat:no-repeat;
            filter: blur(10px) brightness(60%);
            z-index: -1;
        }

        .caixa {
            background-color: rgba(255, 255, 255, 0.473);
            color: rgb(0, 0, 0);
            margin: 50px;
            padding: 20px;
            border-radius: 10px;
        }

        .caixa2 {
            color: wheat;
            font-family: sans-serif;
        }

        .caixa3 {
            color: black;
            font-family: sans-serif;
            background-color: rgba(255, 255, 255, 0.473);
            margin: 10px;
            padding: 10px;
            border-radius: 200px;
            border: 3px solid;
                }
    </style>
    <style>
        .btn-villager {
            background-color: aquamarine;
            color: white;
            border: 3px solid #2e8b57;
            padding: 10px 20px;
            font-size: 25px;
            cursor: pointer;
            font-family: sans-serif;
            transition: 0.5s;
        }

        .btn-villager {
            background-color: #2e8b57;
            border-color: #006400;
        }
    </style>
</head>


<body>
    <div class="fundo"></div>
    <div>
        <center>
            <a href="Home.html"><button class="btn-villager"> <img src="img/tendavillager.png" alt="home"
                        width="90px"><br></button></a>
        </center>
    </div>

    <div>
        <div>
            <font size="6">
                <h1 class="caixa2">Suprimentos</h1>
            </font>
        </div>

        <div>
            <div class="caixa3">
                <div class="h2">
                    <h2>Selecione uma opção</h2>
                </div>
            </div>

            <center>
                <button class="btn-villager">
                    <a href="">
                        <img src="img/Comida.jpg" alt="Comida" width="200px">
                    </a> <br> Alimentos
                </button>

                <button class="btn-villager">
                    <a href="">
                        <img src="img/tronco de madeira.jpg" alt="Recursos" width="196px">
                    </a> <br> Recursos
                </button>
            </center>



        </div>

    </div>

</body>

</html>
